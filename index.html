<!doctype html>
<html>
  <head>
    <!--Import Google Icon Font-->
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <!--Import materialize.css-->
    <link
      type="text/css"
      rel="stylesheet"
      href="./materialize/css/materialize.min.css"
      media="screen,projection"
    />

    <!--Let browser know website is optimized for mobile-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      .bottomy-button {
        position: fixed;
        bottom: 50px;
        left: 50%;
        transform: translateX(-50%);
      }
      .bottomy {
        width: 90%;
        position: fixed;
        bottom: 10%;
        left: 50%;
        transform: translateX(-50%);
      }
    </style>
  </head>

  <body>
    <ul id="ul1"></ul>
    <div class="row bottomy">
      <form class="col s12">
        <div class="row">
          <div class="input-field col s12">
            <textarea id="textarea1" class="materialize-textarea"></textarea>
            <label for="textarea1">Textarea</label>
          </div>
        </div>
      </form>
    </div>
    <a
      onclick="funct()"
      class="waves-effect waves-light btn-large bottomy-button"
      >Button</a
    >
    <!--JavaScript at end of body for optimized loading-->
    <script
      type="text/javascript"
      src="./materialize/js/materialize.min.js"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.18.0/dist/axios.min.js"></script>
    <script src="./main.js"></script>
  </body>
</html>
